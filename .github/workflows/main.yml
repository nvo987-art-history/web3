name: NVO987 Deep Integrity + Semantic Validator

on:
  push:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq tidy libxml2-utils curl grep

      # =========================
      # BASIC VALIDATION
      # =========================

      - name: Validate JSON
        run: |
          find . -name "*.json" ! -path "./.git/*" | while read f; do
            echo "JSON: $f"
            jq empty "$f"
          done

      - name: Validate HTML
        run: |
          find . -name "*.html" ! -path "./.git/*" | while read f; do
            echo "HTML: $f"
            tidy -errors -q "$f" || true
          done

      - name: Validate XML
        run: |
          find . -name "*.xml" ! -path "./.git/*" | while read f; do
            echo "XML: $f"
            xmllint --noout "$f"
          done

      - name: Check empty files
        run: |
          find . -type f ! -path "./.git/*" | while read f; do
            if [ ! -s "$f" ]; then
              echo "Empty file: $f"
              exit 1
            fi
          done

      # =========================
      # REQUIRED ASSETS
      # =========================

      - name: Check assets
        run: |
          find . -name "avatar.png" -o -name "avatar.jpg" | grep -q . || { echo "Missing avatar"; exit 1; }
          find . -name "og-image.jpg" | grep -q . || { echo "Missing og-image"; exit 1; }

      # =========================
      # 🔗 INTERNAL LINK CHECK
      # =========================

      - name: Validate internal links
        run: |
          echo "Scanning internal links..."

          grep -rhoP '(href|src)="\K[^"]+' . | while read link; do
            if [[ "$link" == /* ]]; then
              file=".$link"
              if [ ! -f "$file" ]; then
                echo "Broken internal link: $link"
                exit 1
              fi
            fi
          done

      # =========================
      # JSON URL CHECK
      # =========================

      - name: Validate JSON references
        run: |
          find . -name "*.json" | while read f; do
            jq -r '..|.url? // empty' "$f" | while read url; do
              if [[ "$url" == https://web3.nvo987.us* ]]; then
                path="${url#https://web3.nvo987.us}"
                file=".$path"
                if [ ! -f "$file" ]; then
                  echo "Broken JSON reference in $f → $url"
                  exit 1
                fi
              fi
            done
          done

      # =========================
      # DID CHECK
      # =========================

      - name: Check DID endpoint
        run: |
          echo "Checking DID..."
          curl -s -o /dev/null -w "%{http_code}" https://identity.nvo987.us/.well-known/did.json | grep 200 || {
            echo "DID not reachable"
            exit 1
          }

      # =========================
      # 🌐 SITEMAP + ROBOTS
      # =========================

      - name: Check sitemap.xml
        run: |
          if [ -f "./web3/sitemap.xml" ]; then
            xmllint --noout ./web3/sitemap.xml
            echo "Sitemap valid XML"

            grep -oP '<loc>\K[^<]+' ./web3/sitemap.xml | while read url; do
              if [[ "$url" == https://web3.nvo987.us* ]]; then
                path="${url#https://web3.nvo987.us}"
                file="./web3$path"
                if [ ! -f "$file" ]; then
                  echo "Broken sitemap URL: $url"
                  exit 1
                fi
              fi
            done
          else
            echo "No sitemap.xml (skipped)"
          fi

      - name: Check robots.txt
        run: |
          if [ -f "./web3/robots.txt" ]; then
            echo "robots.txt found"

            grep -i "sitemap:" ./web3/robots.txt | while read line; do
              url=$(echo "$line" | awk '{print $2}')
              curl --head --silent --fail "$url" > /dev/null || {
                echo "robots.txt sitemap unreachable: $url"
                exit 1
              }
            done
          else
            echo "No robots.txt (skipped)"
          fi

      # =========================
      # 🧠 SCHEMA.ORG (JSON-LD)
      # =========================

      - name: Validate schema.org JSON-LD
        run: |
          echo "Checking JSON-LD..."

          grep -rhoP '<script type="application/ld\+json">.*?</script>' . | \
          sed 's/<script[^>]*>//g' | sed 's/<\/script>//g' | while read block; do
            echo "$block" | jq empty || {
              echo "Invalid JSON-LD detected"
              exit 1
            }

            echo "$block" | jq -e '."@context"' > /dev/null || {
              echo "Missing @context in JSON-LD"
              exit 1
            }

            echo "$block" | jq -e '."@type"' > /dev/null || {
              echo "Missing @type in JSON-LD"
              exit 1
            }
          done

      # =========================
      # 🧠 SEMANTIC GRAPH VALIDATION
      # =========================

      - name: Validate knowledge graph
        run: |
          if [ -f "./web3/.well-known/knowledge.json" ]; then
            echo "Validating knowledge graph..."

            jq -e '.id' web3/.well-known/knowledge.json > /dev/null || {
              echo "Missing root id"
              exit 1
            }

            jq -e '.nodes' web3/.well-known/knowledge.json > /dev/null || {
              echo "Missing nodes"
              exit 1
            }

            ids=$(jq -r '.nodes[].id' web3/.well-known/knowledge.json)

            for id in $ids; do
              if [[ "$id" == https://web3.nvo987.us* ]]; then
                path="${id#https://web3.nvo987.us}"
                file="./web3$path"
                if [ ! -f "$file" ]; then
                  echo "Broken node reference: $id"
                  exit 1
                fi
              fi
            done
          else
            echo "No knowledge.json (skipped)"
          fi

      # =========================
      # 🌍 EXTERNAL LINKS (NON-BLOCKING)
      # =========================

      - name: Check external links
        continue-on-error: true
        run: |
          grep -rhoP 'https?://[^"]+' . | sort -u | while read url; do
            curl --head --silent --fail "$url" > /dev/null || echo "Broken external: $url"
          done

      # =========================
      # FINAL
      # =========================

      - name: Done
        run: echo "All validations passed"
